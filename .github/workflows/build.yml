name: Build AIX
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: Download android.jar
      run: |
        wget -q "https://dl.google.com/android/repository/android-21_r02.zip" -O android.zip
        unzip -q android.zip
        cp android-21/android.jar libs/android.jar

    - name: Compile
      run: |
        mkdir -p build/classes
        javac -source 7 -target 7 \
          -classpath libs/android.jar:libs/AndroidRuntime.jar \
          -d build/classes \
          src/com/gamezop/bridge/GamezopBridge.java

    - name: Package AIX
      run: |
        mkdir -p aix/com.gamezop.bridge/files
        cd build/classes
        jar cf ../../aix/com.gamezop.bridge/classes.jar com/
        cd ../..
        cp libs/AndroidRuntime.jar aix/com.gamezop.bridge/files/AndroidRuntime.jar
        cd aix
        zip -r ../GamezopBridge.aix com.gamezop.bridge/

    - uses: actions/upload-artifact@v3
      with:
        name: GamezopBridge
        path: GamezopBridge.aix
