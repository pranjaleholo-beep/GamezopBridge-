name: Build AIX
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-java@v3
      with:
        java-version: '8'
        distribution: 'temurin'
    - name: Get libs
      run: |
        mkdir libs
        wget -q "https://github.com/mit-cml/appinventor-sources/raw/master/appinventor/lib/android/android-21.jar" -O libs/android.jar
        wget -q "https://github.com/mit-cml/appinventor-sources/raw/master/appinventor/components/build/classes/AndroidRuntime/AndroidRuntime.jar" -O libs/simple_components.jar
    - name: Compile
      run: |
        mkdir -p build/classes
        javac -source 7 -target 7 -classpath libs/android.jar:libs/simple_components.jar -d build/classes src/com/gamezop/bridge/GamezopBridge.java
    - name: Package
      run: |
        mkdir -p aix/com.gamezop.bridge/files
        cd build/classes && jar cf ../../aix/com.gamezop.bridge/classes.jar com/ && cd ../..
        cp libs/simple_components.jar aix/com.gamezop.bridge/files/AndroidRuntime.jar
        cd aix && zip -r ../GamezopBridge.aix com.gamezop.bridge/
    - uses: actions/upload-artifact@v3
      with:
        name: GamezopBridge
        path: GamezopBridge.aix
